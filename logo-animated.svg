<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="ghostBody" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#FB923C"/>
      <stop offset="100%" stop-color="#F97316"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.4" r="0.5">
      <stop offset="0%" stop-color="#FDBA74" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#F97316" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Breathing glow -->
  <circle cx="256" cy="250" r="200" fill="url(#glow)">
    <animate attributeName="r" values="190;215;190" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;1;0.7" dur="2.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Floating ghost group -->
  <g>
    <animateTransform attributeName="transform" type="translate"
      values="0,0; 0,-10; 0,0" dur="2.2s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.45 0 0.55 1; 0.45 0 0.55 1"/>

    <!-- Ghost body with shorter, wavier bottom -->
    <path fill="url(#ghostBody)" stroke="#EA580C" stroke-width="3">
      <animate attributeName="d" dur="1.5s" repeatCount="indefinite"
        calcMode="spline" keySplines="0.45 0 0.55 1; 0.45 0 0.55 1"
        values="
          M 256 52 C 160 52, 100 130, 100 230 L 100 370 C 100 385, 115 398, 126 390 C 138 381, 150 395, 163 400 C 176 406, 187 390, 200 386 C 212 382, 220 398, 234 402 C 246 406, 252 394, 256 390 C 260 394, 266 406, 278 402 C 292 398, 300 382, 312 386 C 325 390, 336 406, 349 400 C 362 395, 374 381, 386 390 C 397 398, 412 385, 412 370 L 412 230 C 412 130, 352 52, 256 52 Z;
          M 256 52 C 160 52, 100 130, 100 230 L 100 370 C 100 382, 118 402, 130 394 C 142 386, 153 400, 168 406 C 180 411, 192 393, 204 388 C 216 384, 224 404, 238 408 C 250 412, 256 398, 256 394 C 256 398, 262 412, 274 408 C 288 404, 296 384, 308 388 C 320 393, 332 411, 344 406 C 359 400, 370 386, 382 394 C 394 402, 412 382, 412 370 L 412 230 C 412 130, 352 52, 256 52 Z;
          M 256 52 C 160 52, 100 130, 100 230 L 100 370 C 100 385, 115 398, 126 390 C 138 381, 150 395, 163 400 C 176 406, 187 390, 200 386 C 212 382, 220 398, 234 402 C 246 406, 252 394, 256 390 C 260 394, 266 406, 278 402 C 292 398, 300 382, 312 386 C 325 390, 336 406, 349 400 C 362 395, 374 381, 386 390 C 397 398, 412 385, 412 370 L 412 230 C 412 130, 352 52, 256 52 Z
        "/>
    </path>

    <!-- LEFT EYE - blinks 0.15s earlier than right -->
    <ellipse cx="210" cy="222" rx="34" ry="40" fill="#1a1a2e">
      <animate attributeName="ry" dur="6s" repeatCount="indefinite"
        values="40;40;  10;1;1;10;  40;40;40;  10;1;1;10;  40;40;  10;1;1;10;  40;40"
        keyTimes="0;0.19; 0.22;0.25;0.28;0.31; 0.34;0.54;0.57; 0.60;0.63;0.66;0.69; 0.72;0.81; 0.84;0.87;0.90;0.93; 0.96;1"/>
    </ellipse>
    <circle cx="221" cy="208" r="15" fill="white">
      <animate attributeName="opacity" dur="6s" repeatCount="indefinite"
        values="0.9;0.9; 0;0;0;0; 0.9;0.9;0.9; 0;0;0;0; 0.9;0.9; 0;0;0;0; 0.9;0.9"
        keyTimes="0;0.19; 0.22;0.25;0.28;0.31; 0.34;0.54;0.57; 0.60;0.63;0.66;0.69; 0.72;0.81; 0.84;0.87;0.90;0.93; 0.96;1"/>
    </circle>

    <!-- RIGHT EYE - blinks 0.15s later than left -->
    <ellipse cx="302" cy="222" rx="34" ry="40" fill="#1a1a2e">
      <animate attributeName="ry" dur="6s" repeatCount="indefinite"
        values="40;40;40;  10;1;1;10;  40;40;  10;1;1;10;  40;40;40;  10;1;1;10;  40;40"
        keyTimes="0;0.21;0.24; 0.27;0.30;0.33;0.36; 0.39;0.57; 0.60;0.63;0.66;0.69; 0.72;0.83;0.86; 0.89;0.92;0.95;0.97; 0.99;1"/>
    </ellipse>
    <circle cx="313" cy="208" r="15" fill="white">
      <animate attributeName="opacity" dur="6s" repeatCount="indefinite"
        values="0.9;0.9;0.9; 0;0;0;0; 0.9;0.9; 0;0;0;0; 0.9;0.9;0.9; 0;0;0;0; 0.9;0.9"
        keyTimes="0;0.21;0.24; 0.27;0.30;0.33;0.36; 0.39;0.57; 0.60;0.63;0.66;0.69; 0.72;0.83;0.86; 0.89;0.92;0.95;0.97; 0.99;1"/>
    </circle>

    <!-- Mouth - slightly larger for more expression -->
    <ellipse cx="256" cy="298" rx="26" ry="20" fill="#1a1a2e"/>

    <!-- Tongue -->
    <ellipse cx="256" cy="310" rx="14" ry="9" fill="#EA580C" opacity="0.7"/>

    <!-- Cheek blush - warm amber -->
    <circle cx="175" cy="262" r="24" fill="#FBBF24" opacity="0.25"/>
    <circle cx="337" cy="262" r="24" fill="#FBBF24" opacity="0.25"/>
  </g>
</svg>
